name: Laravel Deployment (Stable Package Version)

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: 🛠️ Checkout code (with stable copy)
        uses: actions/checkout@v3
        with:
          path: 'source-code'  # Creates a clean copy in a subdirectory

      - name: 📦 Create Stable Deployment Package
        run: |
          # Create clean copy without version control files
          mkdir -p deploy-build
          rsync -a --exclude='.git' --exclude='.github' --exclude='.env' source-code/ deploy-build/
          
          # Create timestamped package
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          tar -czf "deploy-$TIMESTAMP.tar.gz" -C deploy-build .
          echo "PACKAGE=deploy-$TIMESTAMP.tar.gz" >> $GITHUB_ENV
          echo "Package created: deploy-$TIMESTAMP.tar.gz"

      - name: ⬆️ Upload Package (SSH)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_SERVER }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          source: "${{ env.PACKAGE }}"
          target: "/tmp/"
          timeout: 5m

      - name: 🚀 Deploy on Server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_SERVER }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          script: |
            echo "Extracting package..."
            tar -xzf "/tmp/${{ env.PACKAGE }}" -C ${{ secrets.SERVER_DIR }}
            
            echo "Setting up environment..."
            cd ${{ secrets.SERVER_DIR }}
            [ ! -f ".env" ] && cp .env.example .env
            
            echo "Installing dependencies..."
            composer install --no-dev --optimize-autoloader
            
            echo "Optimizing application..."
            php artisan optimize:clear
            php artisan storage:link
            
            echo "Setting permissions..."
            chmod -R 775 storage bootstrap/cache
            chown -R www-data:www-data storage bootstrap/cache
            
            echo "Cleaning up..."
            rm "/tmp/${{ env.PACKAGE }}"
            echo "🚀 Deployment completed successfully!"

      - name: 🆘 Fallback Instructions
        if: failure()
        run: |
          echo "::error::Deployment failed. Manual steps:"
          echo "1. Download package from Artifacts: ${{ env.PACKAGE }}"
          echo "2. Upload to server: scp ${{ env.PACKAGE }} user@server:/tmp/"
          echo "3. Run on server:"
          echo "   tar -xzf /tmp/${{ env.PACKAGE }} -C ${{ secrets.SERVER_DIR }}"
          echo "   cd ${{ secrets.SERVER_DIR }}"
          echo "   composer install --no-dev --optimize-autoloader"
          echo "   php artisan optimize:clear"