name: Laravel Deployment (With Artifact Fallback)

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: 🛠️ Checkout code
        uses: actions/checkout@v3
        with:
          path: 'source-code'

      - name: 📦 Create Deployment Package
        run: |
          mkdir -p deploy-build
          rsync -a --exclude='.git' --exclude='.github' --exclude='.env' source-code/ deploy-build/
          
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          tar -czf "deploy-$TIMESTAMP.tar.gz" -C deploy-build .
          echo "PACKAGE=deploy-$TIMESTAMP.tar.gz" >> $GITHUB_ENV

      - name: 📤 Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: deployment-package
          path: ${{ env.PACKAGE }}
          retention-days: 1

      - name: ⬆️ Attempt Automated Deployment
        uses: nick-fields/retry@v2
        with:
          max_attempts: 3
          timeout_minutes: 15
          command: |
            scp -P ${{ secrets.SSH_PORT || '22' }} \
                -o StrictHostKeyChecking=no \
                ${{ env.PACKAGE }} \
                ${{ secrets.SSH_USER }}@${{ secrets.SSH_SERVER }}:/tmp/
            
            ssh -p ${{ secrets.SSH_PORT || '22' }} \
                ${{ secrets.SSH_USER }}@${{ secrets.SSH_SERVER }} \
                "tar -xzf /tmp/${{ env.PACKAGE }} -C ${{ secrets.SERVER_DIR }} && \
                 cd ${{ secrets.SERVER_DIR }} && \
                 [ ! -f '.env' ] && cp .env.example .env; \
                 composer install --no-dev --optimize-autoloader; \
                 php artisan optimize:clear; \
                 php artisan storage:link; \
                 chmod -R 775 storage bootstrap/cache; \
                 rm /tmp/${{ env.PACKAGE }}"

      - name: 📝 Final Manual Instructions
        if: failure()
        run: |
          echo "::error::Automated deployment failed. Complete manual steps:"
          echo "1. Download the package:"
          echo "   - Go to https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          echo "   - Download the 'deployment-package' artifact"
          echo ""
          echo "2. Upload to server:"
          echo "   scp -P ${{ secrets.SSH_PORT || '22' }} deploy-*.tar.gz ${{ secrets.SSH_USER }}@${{ secrets.SSH_SERVER }}:/tmp/"
          echo ""
          echo "3. Execute on server:"
          echo "   tar -xzf /tmp/deploy-*.tar.gz -C ${{ secrets.SERVER_DIR }}"
          echo "   cd ${{ secrets.SERVER_DIR }}"
          echo "   [ ! -f '.env' ] && cp .env.example .env"
          echo "   composer install --no-dev --optimize-autoloader"
          echo "   php artisan optimize:clear"
          echo "   php artisan storage:link"
          echo "   chmod -R 775 storage bootstrap/cache"
          echo "   chown -R www-data:www-data storage bootstrap/cache"
          echo "   rm /tmp/deploy-*.tar.gz"