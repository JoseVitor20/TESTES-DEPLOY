name: Deploy via SSH/SCP com Correção de Timeout

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30  # Aumento do timeout global para 30 minutos
    steps:
      - name: 🛠️ Checkout do código
        uses: actions/checkout@v3

      - name: 🔑 Configuração SSH Avançada
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          echo -e "Host *\n\tStrictHostKeyChecking no\n\tConnectTimeout 30\n\tServerAliveInterval 15" > ~/.ssh/config
          echo "Configuração SSH agressiva para contornar problemas de conexão"

      - name: 🌐 Teste de Conectividade
        run: |
          echo "Testando conexão com o servidor..."
          echo "IP do servidor: ${{ secrets.SSH_DIRECT_IP }}"
          echo "Porta: ${{ secrets.SSH_PORT || '22' }}"
          
          # Teste com timeout
          timeout 10 bash -c "</dev/tcp/${{ secrets.SSH_DIRECT_IP }}/${{ secrets.SSH_PORT || '22' }}" && \
            echo "✅ Porta aberta" || \
            echo "❌ Falha na conexão"

      - name: 📤 Upload via SCP com Retry
        uses: nick-fields/retry@v2
        with:
          max_attempts: 3
          timeout_minutes: 10
          command: |
            scp -v -r \
              -o "ConnectTimeout=20" \
              -P ${{ secrets.SSH_PORT || '22' }} \
              ./* \
              ${{ secrets.SSH_USER }}@${{ secrets.SSH_DIRECT_IP }}:${{ secrets.SERVER_DIR }}

      - name: ⚙️ Configuração do Servidor
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_DIRECT_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          script_timeout: 15m
          script: |
            echo "📂 Acessando diretório..."
            cd ${{ secrets.SERVER_DIR }}
            
            echo "🔧 Configurando .env..."
            [ ! -f ".env" ] && echo "${{ secrets.ENV_CONTENT }}" > .env
            
            echo "📦 Instalando dependências..."
            composer install --no-dev --optimize-autoloader --no-interaction
            
            echo "🔄 Otimizando aplicação..."
            php artisan optimize:clear
            php artisan storage:link
            
            echo "🛠️ Aplicando permissões..."
            chmod -R 775 storage bootstrap/cache
            chown -R www-data:www-data storage bootstrap/cache
            
            echo "🚀 Deploy concluído com sucesso!"