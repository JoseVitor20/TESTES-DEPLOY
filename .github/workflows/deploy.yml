name: 🚀 FTP Deploy Laravel

on:
  push:
    branches:
      - main

jobs:
  ftp-deploy:
    name: 📤 Deploy via FTP
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v3

      - name: 📤 Deploy to FTP server
        uses: dante-ev/ftp-action@v1.0.0
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./ # Caminho do seu projeto Laravel no repositório
          remote-dir: ./ # Caminho de destino no servidor FTP
