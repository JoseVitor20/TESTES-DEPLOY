name: Laravel Deployment via SSH/SCP

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: 🛠️ Checkout code
        uses: actions/checkout@v3

      - name: 🔑 Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          echo -e "Host *\n\tStrictHostKeyChecking no\n\tConnectTimeout 30" > ~/.ssh/config

      - name: 🌐 Test connection
        run: |
          echo "Testing SSH connection to server..."
          ssh -o ConnectTimeout=5 \
              -o KexAlgorithms=diffie-hellman-group-exchange-sha256 \
              ${{ secrets.SSH_USER }}@${{ secrets.SSH_SERVER }} \
              "echo 'Connection successful!'" || true

      - name: 📤 Upload files via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_SERVER }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          source: "./*"
          target: ${{ secrets.SERVER_DIR }}
          overwrite: true
          ssh_options: |
            KexAlgorithms=diffie-hellman-group-exchange-sha256
            HostKeyAlgorithms=ssh-rsa,ssh-dss
            Ciphers=aes128-ctr,aes192-ctr,aes256-ctr
            MACs=hmac-sha2-256,hmac-sha1

      - name: ⚙️ Run server commands
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_SERVER }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          command_timeout: 15m
          script: |
            echo "📂 Changing to project directory..."
            cd ${{ secrets.SERVER_DIR }}
            
            echo "🔧 Setting up .env..."
            [ ! -f ".env" ] && echo "${{ secrets.ENV_CONTENT }}" > .env
            
            echo "📦 Installing dependencies..."
            composer install --no-dev --optimize-autoloader --no-interaction
            
            echo "🔄 Optimizing application..."
            php artisan optimize:clear
            php artisan storage:link
            
            echo "🛠️ Setting permissions..."
            chmod -R 775 storage bootstrap/cache
            chown -R www-data:www-data storage bootstrap/cache
            
            echo "🚀 Deployment completed successfully!"
          ssh_options: |
            KexAlgorithms=diffie-hellman-group-exchange-sha256
            HostKeyAlgorithms=ssh-rsa,ssh-dss
            Ciphers=aes128-ctr,aes192-ctr,aes256-ctr
            MACs=hmac-sha2-256,hmac-sha1