name: Laravel Deployment (Final Fix)

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: 🛠️ Checkout code
        uses: actions/checkout@v3

      - name: 🔍 Network Diagnostics
        id: network-check
        run: |
          echo "Running comprehensive network tests..."
          
          # Test basic connectivity
          ping -c 3 ${{ secrets.SSH_SERVER }} || true
          traceroute ${{ secrets.SSH_SERVER }} || true
          nc -zv -w 5 ${{ secrets.SSH_SERVER }} 22 || true
          
          # Try different ports if needed
          for port in 22 2222; do
            if timeout 5 bash -c "</dev/tcp/${{ secrets.SSH_SERVER }}/$port"; then
              echo "working-port=$port" >> $GITHUB_OUTPUT
              echo "::notice::Discovered working port: $port"
              break
            fi
          done

      - name: 🔑 Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          echo -e "Host *\n\tStrictHostKeyChecking no\n\tConnectTimeout 30" > ~/.ssh/config

      - name: 📤 Deploy via Best Available Method
        uses: nick-fields/retry@v2
        with:
          max_attempts: 3
          timeout_minutes: 15
          command: |
            if [[ -n "${{ steps.network-check.outputs.working-port }}" ]]; then
              echo "Using standard SCP method..."
              scp -r -P ${{ steps.network-check.outputs.working-port || '22' }} \
                -o ConnectTimeout=30 \
                ./* \
                ${{ secrets.SSH_USER }}@${{ secrets.SSH_SERVER }}:${{ secrets.SERVER_DIR }}
            else
              echo "::warning::Using alternative deployment method"
              tar -czf deploy.tar.gz .
              curl -v -T deploy.tar.gz \
                ftp://${{ secrets.SSH_USER }}:${{ secrets.FTP_PASSWORD }}@${{ secrets.SSH_SERVER }}${{ secrets.SERVER_DIR }} || \
                echo "::error::All deployment methods failed"
            fi

      - name: ⚙️ Run Server Commands (if connected)
        if: steps.network-check.outputs.working-port != ''
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_SERVER }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ steps.network-check.outputs.working-port || '22' }}
          script: |
            cd ${{ secrets.SERVER_DIR }}
            [ ! -f ".env" ] && echo "${{ secrets.ENV_CONTENT }}" > .env
            composer install --no-dev --optimize-autoloader
            php artisan optimize:clear
            php artisan storage:link
            chmod -R 775 storage bootstrap/cache
            chown -R www-data:www-data storage bootstrap/cache