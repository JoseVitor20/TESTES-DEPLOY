name: Laravel Deployment via SSH/SCP (Fixed)

on:
  push:
    branches: [ main ]

env:
  SSH_OPTS: -o StrictHostKeyChecking=no -o ConnectTimeout=30 -o KexAlgorithms=diffie-hellman-group-exchange-sha256 -o HostKeyAlgorithms=ssh-rsa -o Ciphers=aes128-ctr

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: 🛠️ Checkout code
        uses: actions/checkout@v3

      - name: 🔑 Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          echo -e "Host *\n\tStrictHostKeyChecking no\n\tConnectTimeout 30\n\tKexAlgorithms diffie-hellman-group-exchange-sha256" > ~/.ssh/config

      - name: 🌐 Test connection
        run: |
          echo "Testing connection to ${{ secrets.SSH_SERVER }}..."
          if ! timeout 10 bash -c "</dev/tcp/${{ secrets.SSH_SERVER }}/${{ secrets.SSH_PORT || 22 }}"; then
            echo "::error::Cannot connect to server"
            exit 1
          fi
          echo "Connection successful!"

      - name: 📤 Upload files via SCP (with retry)
        uses: nick-fields/retry@v2
        with:
          max_attempts: 3
          timeout_minutes: 10
          command: |
            scp -r -P ${{ secrets.SSH_PORT || 22 }} $SSH_OPTS \
            ./* \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_SERVER }}:${{ secrets.SERVER_DIR }}

      - name: ⚙️ Run server commands
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_SERVER }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          command_timeout: 15m
          script: |
            echo "📂 Changing to project directory..."
            cd ${{ secrets.SERVER_DIR }}
            
            echo "🔧 Setting up .env..."
            [ ! -f ".env" ] && echo "${{ secrets.ENV_CONTENT }}" > .env
            
            echo "📦 Installing dependencies..."
            composer install --no-dev --optimize-autoloader --no-interaction
            
            echo "🔄 Optimizing application..."
            php artisan optimize:clear
            php artisan storage:link
            
            echo "🛠️ Setting permissions..."
            chmod -R 775 storage bootstrap/cache
            chown -R www-data:www-data storage bootstrap/cache
            
            echo "🚀 Deployment completed successfully!"