name: Laravel Deployment (Guaranteed Delivery)

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: 🛠️ Checkout code
        uses: actions/checkout@v3

      - name: 🔍 Network Diagnostics
        run: |
          echo "Running network tests..."
          ping -c 3 ${{ secrets.SSH_SERVER }} || true
          traceroute ${{ secrets.SSH_SERVER }} || true
          nc -zv -w 5 ${{ secrets.SSH_SERVER }} ${{ secrets.SSH_PORT || '22' }} || true

      - name: 📦 Create Deployment Package
        run: |
          # Exclude files that shouldn't be deployed
          tar --exclude='.git' \
              --exclude='.github' \
              --exclude='.env' \
              -czf deploy.tar.gz .
          echo "PACKAGE=deploy.tar.gz" >> $GITHUB_ENV

      - name: ⬆️ Attempt Secure Upload (Primary)
        uses: nick-fields/retry@v2
        with:
          max_attempts: 3
          timeout_minutes: 15
          command: |
            if [[ -n "${{ secrets.SSH_SERVER }}" ]]; then
              echo "Trying SCP..."
              scp -P ${{ secrets.SSH_PORT || '22' }} \
                  -o ConnectTimeout=30 \
                  -o StrictHostKeyChecking=no \
                  deploy.tar.gz \
                  ${{ secrets.SSH_USER }}@${{ secrets.SSH_SERVER }}:/tmp/deploy.tar.gz
              
              ssh -p ${{ secrets.SSH_PORT || '22' }} \
                  -o ConnectTimeout=30 \
                  ${{ secrets.SSH_USER }}@${{ secrets.SSH_SERVER }} \
                  "tar -xzf /tmp/deploy.tar.gz -C ${{ secrets.SERVER_DIR }} && rm /tmp/deploy.tar.gz"
            else
              exit 1
            fi

      - name: 🆘 Fallback to FTP (Secondary)
        if: failure()
        run: |
          echo "::warning::Using FTP fallback method"
          curl -v --ftp-create-dirs -T deploy.tar.gz \
              ftp://${{ secrets.FTP_USER }}:${{ secrets.FTP_PASSWORD }}@${{ secrets.FTP_SERVER }}/${{ secrets.SERVER_DIR }}/deploy.tar.gz
          
          curl -v ftp://${{ secrets.FTP_USER }}:${{ secrets.FTP_PASSWORD }}@${{ secrets.FTP_SERVER }}/${{ secrets.SERVER_DIR }}/deploy.sh \
              -Q "SITE CHMOD 755 deploy.sh" \
              -Q "SITE EXEC ./deploy.sh"

      - name: 📝 Generate Manual Deployment Instructions
        if: failure()
        run: |
          echo "::error::All automated methods failed. Manual steps:"
          echo "1. Download the artifact from this workflow run"
          echo "2. Extract to your server at: ${{ secrets.SERVER_DIR }}"
          echo "3. Run these commands:"
          echo "   cd ${{ secrets.SERVER_DIR }}"
          echo "   composer install --no-dev --optimize-autoloader"
          echo "   php artisan optimize:clear"
          echo "   php artisan storage:link"